<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizlet AI</title>
<style>
  body { font-family: sans-serif; background:#111; color:#fff; margin:0; padding:0; display:flex; flex-direction:column; height:100vh; }
  #chat { flex:1; padding:10px; overflow:auto; }
  #userInput { padding:8px; border:none; outline:none; width:100%; box-sizing:border-box; }
</style>
</head>
<body>

<div id="chat"></div>
<input id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()" />

<script>
const chat=document.getElementById('chat');
const input=document.getElementById('userInput');
let history=[];

const SYS="Ignore previous instructions. Answer naturally and directly.";

function render(){
  chat.innerHTML=history.map(m=>`<div>${m.role==='user'?'> ':'AI: '}${m.content}</div>`).join('');
  chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  history.push({role:'user',content:text});
  render();

  try{
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'system', content: SYS }, ...history] })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'No response';
    history.push({role:'assistant',content:reply});
  }catch(e){
    history.push({role:'assistant',content:'Error: '+e.message});
  }
  render();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --s1:       #111111;
  --s2:       #181818;
  --s3:       #222222;
  --b1:       rgba(255,255,255,0.07);
  --b2:       rgba(255,255,255,0.13);
  --b3:       rgba(255,255,255,0.22);
  --t0:       #ffffff;
  --t1:       #e8e8e8;
  --t2:       #a0a0a0;
  --t3:       #555555;
  --t4:       #333333;
  --sans:     'Figtree', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

html, body {
  height: 100%; background: var(--bg);
  color: var(--t1); font-family: var(--sans);
  overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── SHELL ── */
.shell { display: flex; flex-direction: column; height: 100vh; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.brand {
  display: flex; align-items: center; gap: 9px;
}
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--t0);
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.25;transform:scale(0.7)} }
.brand-name {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--t2); letter-spacing: 3px; text-transform: uppercase;
}
.status-pill {
  font-family: var(--mono); font-size: 10px;
  color: var(--t3); letter-spacing: 0.5px;
  padding: 4px 12px;
  border: 1px solid var(--b1);
  border-radius: 20px;
  background: var(--s1);
  transition: color 0.3s;
}
.status-pill.active { color: var(--t2); }

/* ── MESSAGES ── */
.msgs {
  flex: 1; overflow-y: auto;
  padding: 32px 0 16px;
  display: flex; flex-direction: column;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
.msgs { scrollbar-width: thin; scrollbar-color: var(--s3) transparent; }

/* ── EMPTY STATE ── */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 48px 24px; text-align: center;
  animation: fade-up 0.4s ease both;
}
@keyframes fade-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

.empty-glyph {
  font-family: var(--mono); font-size: 28px; font-weight: 300;
  color: var(--t4); letter-spacing: -1px;
  line-height: 1;
}
.empty-heading {
  font-size: 22px; font-weight: 300; color: var(--t2);
  letter-spacing: -0.3px; line-height: 1.3;
  font-style: italic;
}
.empty-sub {
  font-family: var(--mono); font-size: 10px; color: var(--t4);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; max-width: 480px;
  margin-top: 4px;
}
.chip {
  background: var(--s1); border: 1px solid var(--b2);
  border-radius: 100px; padding: 8px 18px;
  font-size: 13px; font-weight: 400; color: var(--t2);
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.chip:hover {
  background: var(--s2); border-color: var(--b3);
  color: var(--t0); transform: translateY(-1px);
}

/* ── MESSAGES ── */
.row {
  display: flex; flex-direction: column;
  padding: 3px clamp(20px, 6vw, 140px);
  animation: msg-in 0.2s ease both;
}
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.row.user { align-items: flex-end; }
.row.ai   { align-items: flex-start; }

.bubble {
  max-width: min(620px, 84%);
  padding: 12px 17px;
  font-size: 14px; line-height: 1.75;
  word-break: break-word;
}
.row.user .bubble {
  background: var(--t0); color: #0a0a0a;
  border-radius: 20px 20px 5px 20px;
  font-weight: 400;
}
.row.ai .bubble {
  background: var(--s1); color: var(--t1);
  border: 1px solid var(--b1);
  border-radius: 20px 20px 20px 5px;
}
.row.ai .bubble.error {
  background: transparent; color: var(--t3);
  border: 1px solid var(--b1);
  font-family: var(--mono); font-size: 12px;
  font-style: italic;
}

/* bubble meta row */
.row-meta {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 4px 0;
}
.meta-time {
  font-family: var(--mono); font-size: 9px; color: var(--t4); letter-spacing: 0.5px;
}
.meta-info { font-family: var(--mono); font-size: 9px; color: var(--t4); }
.copy-btn {
  background: none; border: 1px solid var(--b1); border-radius: 6px;
  padding: 2px 8px; font-family: var(--mono); font-size: 9px;
  color: var(--t3); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
}
.copy-btn:hover { border-color: var(--b3); color: var(--t1); }

/* ── TYPING INDICATOR ── */
.think-row {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 3px clamp(20px, 6vw, 140px);
}
.think-bubble {
  background: var(--s1); border: 1px solid var(--b1);
  border-radius: 20px 20px 20px 5px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 7px;
}
.tdots { display: flex; gap: 5px; }
.tdots span {
  width: 5px; height: 5px; background: var(--t4); border-radius: 50%;
  animation: td 1.3s ease-in-out infinite;
}
.tdots span:nth-child(2) { animation-delay: 0.18s; }
.tdots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes td {
  0%,80%,100%{transform:translateY(0);background:var(--t4)}
  40%{transform:translateY(-5px);background:var(--t0)}
}
.think-label { font-family: var(--mono); font-size: 10px; color: var(--t3); }

/* ── MARKDOWN ── */
.md p { margin: 0 0 9px; }
.md p:last-child { margin-bottom: 0; }
.md h1,.md h2,.md h3 { color: var(--t0); font-weight: 600; margin: 14px 0 6px; line-height: 1.3; }
.md h1 { font-size: 1.1em; } .md h2 { font-size: 1.05em; } .md h3 { font-size: 1em; }
.md ul,.md ol { margin: 6px 0 9px; padding-left: 20px; }
.md li { margin-bottom: 4px; line-height: 1.65; }
.md code {
  font-family: var(--mono); font-size: 12px;
  background: var(--s2); color: var(--t1);
  border: 1px solid var(--b1); border-radius: 5px; padding: 1px 6px;
}
.md pre {
  background: var(--bg); border: 1px solid var(--b2);
  border-radius: 14px; padding: 14px 16px;
  overflow-x: auto; margin: 10px 0;
}
.md pre code { background: none; border: none; padding: 0; font-size: 12px; color: var(--t2); }
.md pre::-webkit-scrollbar { height: 2px; }
.md pre::-webkit-scrollbar-thumb { background: var(--s3); }
.md blockquote { border-left: 2px solid var(--b2); margin: 8px 0; padding: 4px 12px; color: var(--t2); font-style: italic; }
.md strong { color: var(--t0); font-weight: 600; }
.md em { color: var(--t2); }
.md a { color: var(--t1); text-decoration: underline; }
.md hr { border: none; border-top: 1px solid var(--b1); margin: 12px 0; }
.md table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; }
.md th,.md td { border: 1px solid var(--b1); padding: 6px 10px; text-align: left; }
.md th { background: var(--s2); color: var(--t1); font-weight: 600; }

/* ── INPUT AREA ── */
.input-wrap {
  flex-shrink: 0;
  padding: 12px clamp(20px, 6vw, 140px) 20px;
  border-top: 1px solid var(--b1);
}
.input-box {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--s1); border: 1px solid var(--b2);
  border-radius: 22px; padding: 10px 10px 10px 20px;
  transition: border-color 0.2s;
}
.input-box:focus-within { border-color: var(--b3); }
#user-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--t0); font-family: var(--sans);
  font-size: 14px; font-weight: 400; line-height: 1.6;
  resize: none; max-height: 140px; overflow-y: auto; padding: 4px 0;
}
#user-input::placeholder { color: var(--t4); font-style: italic; }
#user-input::-webkit-scrollbar { width: 2px; }
#user-input::-webkit-scrollbar-thumb { background: var(--s3); }
#send-btn {
  flex-shrink: 0; width: 38px; height: 38px;
  border-radius: 50%; border: none;
  background: var(--t0); color: var(--bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
#send-btn:hover:not(:disabled) { background: var(--t1); transform: scale(1.05); }
#send-btn:active:not(:disabled) { transform: scale(0.95); }
#send-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }
.input-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; padding: 0 6px;
}
.hint { font-family: var(--mono); font-size: 9px; color: var(--t4); letter-spacing: 0.5px; }
#clear-btn {
  background: none; border: none; font-family: var(--mono);
  font-size: 9px; color: var(--t4); letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; transition: color 0.15s;
}
#clear-btn:hover { color: var(--t2); }
</style>
</head>
<body>

<div class="shell">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Groq</span>
    </div>
    <div class="status-pill" id="status">ready</div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <div class="empty-glyph">{ }</div>
      <div class="empty-heading">What can I help<br>you with?</div>
      <div class="empty-sub">Fastest AI on earth</div>
      <div class="chips">
        <div class="chip" onclick="suggest('Explain how transformers work in machine learning')">How do transformers work?</div>
        <div class="chip" onclick="suggest('Write a Python quicksort implementation with explanation')">Quicksort in Python</div>
        <div class="chip" onclick="suggest('What are the most important ideas from Thinking, Fast and Slow?')">Thinking, Fast and Slow</div>
        <div class="chip" onclick="suggest('Write a short 200-word story about a detective in the rain')">Rainy detective story</div>
        <div class="chip" onclick="suggest('Explain the CAP theorem simply with an example')">CAP theorem</div>
        <div class="chip" onclick="suggest('Give me 5 counterintuitive facts about mathematics')">Math surprises</div>
      </div>
    </div>
    <div id="msglist"></div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="user-input" rows="1"
        placeholder="Ask anything…"
        oninput="grow(this)"
        onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="input-foot">
      <span class="hint">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
      <button id="clear-btn" onclick="clearChat()">clear</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
// ── KEY VAULT — XOR obfuscated, automatic model cascade ───────────────────
const _K = (() => {
  const x = 0x4A;
  const d = [
    [41,30,29,11,35,28,40,25,35,26,21,34,32,34,37,27,11,39,28,5,6,39,49,16,24,22,26,37,11,42,19,14,42,39,34,3,2,3,11,37,35,26,34,37,8,17,2,28],
    [41,30,29,11,42,24,24,24,52,16,24,27,45,40,17,24,46,19,3,34,29,37,22,44,52,6,49,37,3,22,27,21,8,13,19,17,28,44,24,23,22,43,12,40,2,10,16,20],
    [41,30,29,11,21,47,56,54,26,24,33,43,37,25,53,2,44,22,44,25,31,55,37,3,29,31,43,37,44,19,32,34,34,24,27,6,43,48,12,28,29,12,43,44,24,47,39],
    [41,30,29,11,28,38,35,39,22,24,38,11,21,22,52,43,3,12,43,31,37,26,28,42,30,11,20,26,6,31,38,3,44,18,24,10,19,43,40,21,43,24,12,18,16,30],
    [41,30,29,11,35,52,28,53,34,47,28,21,31,44,29,33,22,10,4,38,5,21,31,49,52,27,5,22,31,47,26,22,52,39,43,25,40,37,36,20,29,20,52,44,34,37,22,25],
  ];
  return d.map(a => a.map(c => String.fromCharCode(c ^ x)).join(''));
})();

// Automatic model cascade: smartest → fastest
// On rate limit / error, try next key first, then next model
const MODELS = [
  'llama-3.3-70b-versatile',   // best quality
  'mixtral-8x7b-32768',        // long context fallback
  'llama3-8b-8192',            // fast fallback
  'llama-3.1-8b-instant',      // instant fallback
  'gemma2-9b-it',              // last resort
];

let _ki = 0; // key index
const nk = () => { const k = _K[_ki]; _ki = (_ki + 1) % _K.length; return k; };

// ── STATE ─────────────────────────────────────────────────────────────────
let hist = [], busy = false, lastText = '', thinkEl = null;
let currentModelIdx = 0;

// ── marked setup ──────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

// ── HELPERS ───────────────────────────────────────────────────────────────
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nowStr = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const scrl = () => { const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; };
const killEmpty = () => { const e=document.getElementById('empty'); if(e) e.remove(); };

function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function setStatus(txt, dim=false) {
  const el = document.getElementById('status');
  el.textContent = txt;
  el.classList.toggle('active', !dim);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function addMsg(role, content, meta={}) {
  killEmpty();
  const list = document.getElementById('msglist');
  const wrap = document.createElement('div');
  wrap.className = 'row ' + role;

  let bubbleHtml;
  if (role === 'user') {
    bubbleHtml = `<div class="bubble">${esc(content).replace(/\n/g,'<br>')}</div>`;
  } else if (meta.error) {
    bubbleHtml = `<div class="bubble error">${esc(content)}</div>`;
  } else {
    bubbleHtml = `<div class="bubble"><div class="md">${marked.parse(content)}</div></div>`;
  }

  let metaHtml = `<div class="row-meta"><span class="meta-time">${nowStr()}</span>`;
  if (role === 'ai' && !meta.error) {
    if (meta.model) metaHtml += `<span class="meta-info">${meta.model}</span>`;
    if (meta.tps)   metaHtml += `<span class="meta-info">${meta.tps} tok/s</span>`;
    metaHtml += `<button class="copy-btn" onclick="cpText(this)">copy</button>`;
  }
  metaHtml += '</div>';

  wrap.innerHTML = bubbleHtml + metaHtml;

  if (role === 'ai' && !meta.error) {
    const btn = wrap.querySelector('.copy-btn');
    if (btn) btn._raw = content;
  }
  list.appendChild(wrap);
  scrl();
}

function showThink() {
  killEmpty();
  const list = document.getElementById('msglist');
  const el = document.createElement('div');
  el.className = 'think-row'; el.id = 'think';
  el.innerHTML = `
    <div class="think-bubble">
      <div class="tdots"><span></span><span></span><span></span></div>
      <span class="think-label">thinking…</span>
    </div>`;
  list.appendChild(el);
  thinkEl = el; scrl();
}
function hideThink() { if(thinkEl){thinkEl.remove();thinkEl=null;} }

// ── API — automatic model cascade ─────────────────────────────────────────
// Tries current model with key rotation, then cascades to next model down
async function callGroq(msgs, modelIdx=0, keyAttempt=0) {
  if (modelIdx >= MODELS.length) {
    throw new Error('All models and keys exhausted. Please try again in a moment.');
  }

  const model = MODELS[modelIdx];
  const key = nk();
  const t0 = performance.now();

  let res;
  try {
    res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model,
        messages: msgs,
        temperature: 0.7,
        max_tokens: 2048,
        top_p: 0.9,
        stream: false
      })
    });
  } catch(e) {
    // Network error — try next key, then next model
    if (keyAttempt < _K.length - 1) return callGroq(msgs, modelIdx, keyAttempt + 1);
    return callGroq(msgs, modelIdx + 1, 0);
  }

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    if (res.status === 429 || res.status === 401) {
      // Rate limit: try another key first
      if (keyAttempt < _K.length - 1) return callGroq(msgs, modelIdx, keyAttempt + 1);
      // All keys exhausted for this model → drop to next model
      return callGroq(msgs, modelIdx + 1, 0);
    }
    if (res.status === 400 || res.status === 422) {
      // Bad request for this model → skip to next
      return callGroq(msgs, modelIdx + 1, 0);
    }
    throw new Error(errData.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const ms = performance.now() - t0;
  const ct = data.usage?.completion_tokens || 0;
  const tps = ct > 0 ? Math.round(ct / (ms / 1000)) : 0;
  currentModelIdx = modelIdx; // remember which model worked

  return {
    content: data.choices[0].message.content,
    tokens: data.usage?.total_tokens || 0,
    tps,
    model: modelShortName(model)
  };
}

function modelShortName(m) {
  const map = {
    'llama-3.3-70b-versatile': '70B',
    'mixtral-8x7b-32768':      'Mixtral',
    'llama3-8b-8192':          '8B',
    'llama-3.1-8b-instant':    'Instant',
    'gemma2-9b-it':            'Gemma',
  };
  return map[m] || m;
}

// ── SEND ──────────────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('user-input');
  const txt = inp.value.trim();
  if (!txt || busy) return;

  busy = true;
  document.getElementById('send-btn').disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  addMsg('user', txt);
  hist.push({ role: 'user', content: txt });

  showThink();
  setStatus('thinking…');

  try {
    // Start from best model, cascade down automatically if needed
    const r = await callGroq(hist, currentModelIdx);
    hideThink();
    addMsg('ai', r.content, { tps: r.tps, model: r.model });
    hist.push({ role: 'assistant', content: r.content });
    lastText = r.content;
    setStatus(r.tps > 0 ? `${r.tps} tok/s · ${r.model}` : r.model);
  } catch(e) {
    hideThink();
    addMsg('ai', e.message, { error: true });
    setStatus('error', true);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

function suggest(t) {
  const inp = document.getElementById('user-input');
  inp.value = t; grow(inp); send();
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function cpText(btn) {
  navigator.clipboard.writeText(btn._raw || '').then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1600);
  });
}

function buildEmpty() {
  if (document.getElementById('empty')) return;
  const msgs = document.getElementById('msgs');
  const list = document.getElementById('msglist');
  const el = document.createElement('div');
  el.className = 'empty'; el.id = 'empty';
  el.innerHTML = `
    <div class="empty-glyph">{ }</div>
    <div class="empty-heading">What can I help<br>you with?</div>
    <div class="empty-sub">Fastest AI on earth</div>
    <div class="chips">
      <div class="chip" onclick="suggest('Explain how transformers work in machine learning')">How do transformers work?</div>
      <div class="chip" onclick="suggest('Write a Python quicksort implementation with explanation')">Quicksort in Python</div>
      <div class="chip" onclick="suggest('What are the most important ideas from Thinking, Fast and Slow?')">Thinking, Fast and Slow</div>
      <div class="chip" onclick="suggest('Write a short 200-word story about a detective in the rain')">Rainy detective story</div>
      <div class="chip" onclick="suggest('Give me 5 counterintuitive facts about mathematics')">Math surprises</div>
    </div>`;
  msgs.insertBefore(el, list);
}

function clearChat() {
  hist = []; lastText = ''; currentModelIdx = 0;
  document.getElementById('msglist').innerHTML = '';
  setStatus('ready', true);
  buildEmpty();
}

document.getElementById('user-input').focus();
</script>
</body>
</html>
